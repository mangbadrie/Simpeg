<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRIS Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="bg-gray-50 pb-24">
    <div x-data="absensiApp()" x-init="init()" class="min-h-screen">
      <header class="bg-white shadow-sm p-4 sticky top-0 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
          <h1 class="text-xl font-bold text-gray-800">
            HRIS <span class="text-blue-600">Attendance</span>
          </h1>
          <div
            class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xs"
          >
            BS
          </div>
        </div>
      </header>

      <main class="max-w-md mx-auto p-4 space-y-8">
        <div
          x-show="activeTab === 'home'"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 transform translate-y-2"
          x-transition:enter-end="opacity-100 transform translate-y-0"
          class="space-y-6"
          x-cloak
        >
          <div class="flex justify-between items-center px-1">
            <h3 class="font-bold text-gray-700" x-text="tanggal"></h3>
            <h3 class="font-bold font-mono text-gray-700" x-text="jam"></h3>
          </div>

          <div
            class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-3xl p-6 text-white shadow-xl shadow-blue-200 relative overflow-hidden"
          >
            <div class="relative z-10">
              <p class="text-blue-100 text-sm font-medium">Selamat Pagi,</p>
              <h3 class="text-2xl font-bold mt-0.5">Budi Santoso</h3>

              <div class="grid grid-cols-2 gap-4 mt-8">
                <div
                  class="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/10"
                >
                  <p
                    class="text-[10px] uppercase tracking-widest text-blue-200 font-bold mb-1"
                  >
                    Jam Masuk
                  </p>
                  <p class="font-bold text-xl" x-text="jamMasuk || '--:--'"></p>
                </div>
                <div
                  class="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/10"
                >
                  <p
                    class="text-[10px] uppercase tracking-widest text-blue-200 font-bold mb-1"
                  >
                    Status
                  </p>
                  <p class="font-bold text-xl" x-text="status"></p>
                </div>
              </div>
            </div>
          </div>

          <div
            class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100"
          >
            <div
              class="flex items-center gap-4 mb-6 bg-gray-50 p-4 rounded-2xl"
            >
              <div class="bg-white p-3 rounded-xl shadow-sm text-blue-600">
                <svg
                  class="w-6 h-6"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
              </div>
              <div class="min-w-0">
                <p
                  class="text-[10px] uppercase text-gray-400 font-bold tracking-wider"
                >
                  Lokasi Anda
                </p>
                <p
                  class="text-sm font-bold text-gray-800 truncate"
                  x-text="lokasi"
                ></p>
              </div>
            </div>

            <button
              @click="doAbsen()"
              :disabled="status === 'Hadir'"
              class="w-full py-4 bg-gray-900 hover:bg-black active:scale-[0.98] disabled:bg-gray-200 disabled:text-gray-400 text-white rounded-2xl font-bold transition-all shadow-lg shadow-gray-200"
            >
              <span
                x-text="status === 'Hadir' ? 'Anda Sudah Absen' : 'Absen Sekarang'"
              ></span>
            </button>
          </div>
        </div>

        <div
          x-show="activeTab !== 'home'"
          x-cloak
          class="text-center mt-10 p-10 border-2 border-dashed border-gray-200 rounded-3xl"
        >
          <p class="text-gray-400 font-medium">
            Halaman <span x-text="activeTab" class="capitalize"></span> sedang
            dalam pengembangan
          </p>
        </div>
      </main>

      <nav
        class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-around items-end h-16 z-50 px-2 pb-2"
      >
        <template x-for="menu in menus" :key="menu.id">
          <button
            @click="activeTab = menu.id"
            :class="menu.id === 'qrcode' ? '-mt-6 bg-blue-600 text-white p-3 rounded-full shadow-lg shadow-blue-300 border-4 border-white' : (activeTab === menu.id ? 'text-blue-600' : 'text-gray-400')"
            class="flex flex-col items-center justify-center text-[10px] font-bold transition-all w-16"
          >
            <div
              x-html="menu.icon"
              :class="menu.id === 'qrcode' ? 'w-8 h-8' : 'w-6 h-6'"
            ></div>
            <span
              x-show="menu.id !== 'qrcode'"
              x-text="menu.label"
              class="mt-1"
            ></span>
          </button>
        </template>
      </nav>
    </div>

    <script>
      function absensiApp() {
        return {
          activeTab: "home",
          status: "Belum Absen",
          jamMasuk: null,
          tanggal: "",
          jam: "",
          lokasi: "Serang, Banten, Indonesia",

          init() {
            this.updateTime();
            setInterval(() => this.updateTime(), 1000);
          },

          updateTime() {
            const now = new Date();
            this.tanggal = now.toLocaleDateString("id-ID", {
              day: "2-digit",
              month: "long",
              year: "numeric",
            });
            this.jam = now.toLocaleTimeString("id-ID", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            });
          },

          doAbsen() {
            this.jamMasuk = new Date().toLocaleTimeString("id-ID", {
              hour: "2-digit",
              minute: "2-digit",
            });
            this.status = "Hadir";
          },

          menus: [
            {
              id: "home",
              label: "Home",
              icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>',
            },
            {
              id: "data",
              label: "Data",
              icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>',
            },
            {
              id: "qrcode",
              label: "QR",
              icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>',
            },
            {
              id: "notif",
              label: "Notif",
              icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>',
            },
            {
              id: "profil",
              label: "Profil",
              icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>',
            },
          ],
        };
      }
    </script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </body>
</html>
